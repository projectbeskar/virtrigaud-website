# Libvirt credentials secret for VirtRigaud
#
# The Libvirt provider authenticates via SSH. Supported keys:
#   ssh-privatekey  — raw PEM-encoded private key (recommended)
#   username        — SSH username (required)
#   password        — SSH password (less secure; use ssh-privatekey instead)
#   known_hosts     — SSH known_hosts entries for the libvirt host (required in v0.3.7+)
#
# v0.3.7: SSH host-key verification is ON by default. Add known_hosts to avoid
# a hard-fail connection. Seed it with:
#   ssh-keyscan -H <libvirt-host> >> known_hosts
# then store the file contents under the known_hosts key below.

---
# SSH key authentication (recommended):
apiVersion: v1
kind: Secret
metadata:
  name: libvirt-creds
  namespace: default
type: Opaque
stringData:
  username: "virtrigaud"
  # ssh-privatekey must be the raw PEM-encoded private key (not base64-encoded again)
  ssh-privatekey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REDACTED
    -----END OPENSSH PRIVATE KEY-----
  # seed via: ssh-keyscan -H <libvirt-host> >> known_hosts
  known_hosts: |
    |1|REDACTED_HASH_1=|REDACTED_HASH_2= ssh-ed25519 REDACTED_HOST_PUBLIC_KEY

---
# Password authentication (less secure):
apiVersion: v1
kind: Secret
metadata:
  name: libvirt-creds-password
  namespace: default
type: Opaque
stringData:
  username: "virtrigaud"
  password: "REDACTED"
  # seed via: ssh-keyscan -H <libvirt-host> >> known_hosts
  known_hosts: |
    |1|REDACTED_HASH_1=|REDACTED_HASH_2= ssh-ed25519 REDACTED_HOST_PUBLIC_KEY
