# Libvirt credentials secret for VirtRigaud
#
# The Libvirt provider authenticates via SSH. Supported keys:
#   ssh-privatekey  — raw PEM-encoded private key (recommended)
#   username        — SSH username (required)
#   password        — SSH password (less secure; use ssh-privatekey instead)

---
# SSH key authentication (recommended):
apiVersion: v1
kind: Secret
metadata:
  name: libvirt-creds
  namespace: default
type: Opaque
stringData:
  username: "virtrigaud"
  # ssh-privatekey must be the raw PEM-encoded private key (not base64-encoded again)
  ssh-privatekey: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REDACTED
    -----END OPENSSH PRIVATE KEY-----

---
# Password authentication (less secure):
apiVersion: v1
kind: Secret
metadata:
  name: libvirt-creds-password
  namespace: default
type: Opaque
stringData:
  username: "virtrigaud"
  password: "REDACTED"
