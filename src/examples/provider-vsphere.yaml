# vSphere Provider Example
# This example demonstrates Remote provider configuration for VMware vSphere
#
# ⚠️  IMPORTANT: Requires Active vSphere Environment  
# The vSphere provider needs access to vCenter Server or ESXi hosts.
# See docs/providers/vsphere.md for setup instructions and configuration details.

apiVersion: infra.virtrigaud.io/v1beta1
kind: Provider
metadata:
  name: vsphere-prod
  namespace: default
spec:
  type: vsphere
  endpoint: https://vcenter.example.com/sdk
  credentialSecretRef:
    name: vsphere-creds
  insecureSkipVerify: false
  runtime:
    mode: Remote
    image: "ghcr.io/projectbeskar/virtrigaud/provider-vsphere:v0.3.7"
    service:
      port: 9090
      # v0.3.7: a Provider with NO tls block fails to reconcile (TLSConfigured=False, Reason=TLSBlockMissing).
      # Set tls.enabled: false to keep plaintext (dev/lab only).
      tls:
        enabled: true
        secretRef:
          name: provider-vsphere-tls   # Secret (kubernetes.io/tls or Opaque) with tls.crt, tls.key, ca.crt
        insecureSkipVerify: false
  defaults:
    datastore: datastore1
    cluster: compute-cluster-a
    folder: virtrigaud-vms
