      - Examples:
          - Basic Examples: examples/index.md
          - Advanced Examples: examples/advanced/index.md
  - Guides:
      - Overview: guides/index.md
      - Provider Guides:
          - vSphere Provider: providers/vsphere.md
          - Libvirt Provider: providers/libvirt.md
          - Proxmox VE Provider: providers/proxmox.md
          - Provider Capabilities Matrix: providers/providers-capabilities.md
          - Provider Tutorial: providers/tutorial.md
          - Provider Versioning: providers/versioning.md
      - Advanced Topics:
          - VM Lifecycle Management: guides/advanced/advanced-lifecycle.md
          - VM Cloning: guides/advanced/vm-cloning.md
          - Nested Virtualization: guides/advanced/nested-virtualization.md
          - Graceful Shutdown: guides/advanced/graceful-shutdown.md
          - Remote Providers: guides/advanced/remote-providers.md
  - VM Migration:
      - User Guide: migration/user-guide.md
      - Migration Guide: migration/vm-migration-guide.md
      - API Reference: migration/api-reference.md
  - Operations:
      - Overview: operations/index.md
      - Observability: operations/observability.md
      - Resilience: operations/resilience.md
      - Upgrade Guide: operations/upgrade.md
      - vSphere Hardware Versions: operations/vsphere-hardware-version.md
      - Libvirt Host Preparation: operations/libvirt-host-prepare.md
      - Security:
          - Overview: operations/security.md
          - Bearer Token Authentication: providers/security/bearer-token.md
          - mTLS Configuration: providers/security/mtls.md
          - External Secrets: providers/security/external-secrets.md
          - Network Policies: providers/security/network-policies.md
  - References:
      - Custom Resource Definitions: references/crds.md
      - CLI Tools Reference: references/cli-tools.md
      - CLI API Reference: api-reference/cli.md
      - Metrics Catalog: api-reference/metrics.md
      - Provider Catalog: references/catalog.md
      - Full CRD Reference: references/generated-crd-docs.md
      - Provider gRPC API: references/grpc-api.md
  - Development:
      - Overview: development/index.md
      - Building Locally: development/building-locally.md
      - Contributing Guide: development/contributing.md
      - Testing Locally: development/testing-locally.md
      - Provider Development: development/providers.md

# Extra configuration
extra_css:
  - stylesheets/extra.css

