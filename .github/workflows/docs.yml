name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'VirtRigaud release tag to document (e.g. v1.2.3). Defaults to latest main.'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout documentation repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout VirtRigaud repository
        uses: actions/checkout@v6
        with:
          repository: projectbeskar/virtrigaud
          path: virtrigaud
          # Pin to the release tag when triggered by the release workflow;
          # otherwise use the default branch (HEAD).
          ref: ${{ inputs.version || '' }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Go documentation tools
        run: |
          go install github.com/elastic/crd-ref-docs@latest
          go install github.com/bufbuild/buf/cmd/buf@latest
          go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate CRD documentation
        run: |
          cd virtrigaud
          crd-ref-docs \
            --source-path=api \
            --config=../tools/crd-ref-docs-config.yaml \
            --renderer=markdown \
            --output-path=../src/generated-crd-docs.md
          cd ..
          echo "CRD documentation generated at src/generated-crd-docs.md"

      - name: Generate proto/gRPC API documentation
        run: |
          cd virtrigaud
          buf generate proto --template ../tools/buf.gen.docs.yaml
          cd ..
          echo "Proto documentation generated at src/references/grpc-api.md"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Build documentation
        run: poetry run mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
